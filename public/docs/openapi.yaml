openapi: 3.0.0
info:
  title: Flockwise BizTrack API
  description: |
    Production-grade API-First Engine for the Flockwise BizTrack Poultry Management System.
    
    ### Key Features:
    * **Bearer Token Auth**: Powered by Laravel Sanctum.
    * **Spatie RBAC**: Admin, Manager, Accountant, Sales, and Store Keeper role gates.
    * **Audit-Logged Movements**: Strict transactional consistency with DB::transaction and automatic mutation logs.
    * **High-Performance Caching**: Dashboard and Analytical metrics cached dynamically for 5 minutes.
  version: 1.0.0
servers:
  - url: /api/v1
    description: Current Environment API Server
paths:
  /auth/login:
    post:
      summary: Authentication Login
      description: Exchange credentials for a Sanctum Personal Access Token.
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: admin
                password:
                  type: string
                  format: password
                  example: secret123
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Authentication successful
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        example: 1|pa7as6f5da8sf7as8df6as78d6fa7s8d
                      user:
                        $ref: '#/components/schemas/User'
        "422":
          description: Validation Error
  /auth/logout:
    post:
      summary: Revoke Active Token
      tags:
        - Authentication
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Token revoked successfully
  /auth/profile:
    get:
      summary: Get Authenticated User Profile
      tags:
        - Authentication
      security:
        - BearerAuth: []
      responses:
        "200":
          description: User profile details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/User'
  /dashboard:
    get:
      summary: Get Live Dashboard Stats (5-Min Cache)
      tags:
        - Dashboard
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Analytics dashboard summary
  /masters/customers:
    get:
      summary: List Customers (Paginated)
      tags:
        - Masters Module
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: Paginated customers list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
  /stock:
    get:
      summary: Get Real-Time Inventory Stock Balances
      tags:
        - Stock & Inventory
      security:
        - BearerAuth: []
      parameters:
        - name: search
          in: query
          description: Search by item name or item code
          schema:
            type: string
        - name: type
          in: query
          description: Filter by item type (Feed, Medicine, etc.)
          schema:
            type: string
      responses:
        "200":
          description: Detailed stock balances and status checks (Low, Out of Stock, Healthy)
  /stock/movements:
    get:
      summary: List Stock Ledgers and Movements (Paginated)
      tags:
        - Stock & Inventory
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Paginated movements ledger
  /stock/adjust:
    post:
      summary: Manual Stock Adjustment
      description: Mutate stock balances with a custom Adjustment transaction. Triggers audit logging.
      tags:
        - Stock & Inventory
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - item_id
                - warehouse_id
                - quantity
                - remarks
                - date
              properties:
                item_id:
                  type: integer
                  example: 1
                warehouse_id:
                  type: integer
                  example: 1
                batch_id:
                  type: integer
                  example: 1
                quantity:
                  type: number
                  description: Positive for IN, Negative for OUT adjustments
                  example: -15.5
                remarks:
                  type: string
                  example: Spillage adjustment in feed warehouse
                date:
                  type: string
                  format: date
                  example: "2026-05-22"
      responses:
        "201":
          description: Adjustment processed successfully
  /inventory/analytics:
    get:
      summary: Calculate Farm-Cycle KPIs & Charts (5-Min Cache)
      tags:
        - Livestock Cycle
      security:
        - BearerAuth: []
      parameters:
        - name: batch_id
          in: query
          description: Farm cycles batch primary ID
          schema:
            type: integer
      responses:
        "200":
          description: Active batches, Survival rates, Feed Conversion metrics, and 14-day history chart datasets
  /mortalities:
    post:
      summary: Log Bird Mortality
      description: Record batch mortality and automatically decrement active flock counts inside transactions.
      tags:
        - Livestock Cycle
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - date
                - batch_id
                - count
              properties:
                date:
                  type: string
                  format: date
                  example: "2026-05-22"
                batch_id:
                  type: integer
                  example: 1
                count:
                  type: integer
                  example: 12
                reason:
                  type: string
                  example: Heat stress
                remarks:
                  type: string
                  example: Found during morning inspections
      responses:
        "201":
          description: Mortality logged and batch count decremented
  /users:
    get:
      summary: List Staff Users and Activity Logs
      tags:
        - User Administration
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Paginated user profiles, active system roles, and raw activity audits
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Admin Operator
        username:
          type: string
          example: admin
        email:
          type: string
          example: admin@flockwise.com
        is_active:
          type: boolean
          example: true
    PaginatedResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Data fetched successfully
        data:
          type: array
          items:
            type: object
        pagination:
          type: object
          properties:
            current_page:
              type: integer
              example: 1
            per_page:
              type: integer
              example: 15
            total:
              type: integer
              example: 128
